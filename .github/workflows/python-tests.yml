name: Python Tests

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8==6.1.0 black==23.12.1 isort==5.13.2

    - name: Check code format (Black)
      run: black --check backend/

    - name: Check import order (isort)
      run: isort --check-only backend/

    - name: Lint with flake8
      run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Scan dependencies for vulnerabilities
      run: pip-audit -r backend/requirements.txt --ignore-vuln CVE-2025-62727

  tests:
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Wait for PostgreSQL
      run: |
        python - <<'PY'
        import socket
        import time

        deadline = time.time() + 60
        last_error = None
        while time.time() < deadline:
            try:
                with socket.create_connection(("localhost", 5432), timeout=2):
                    print("PostgreSQL is reachable.")
                    break
            except OSError as exc:
                last_error = exc
                time.sleep(1)
        else:
            raise RuntimeError(f"PostgreSQL not reachable after 60s: {last_error}")
        PY

    - name: Run migrations
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      run: |
        alembic upgrade head

    - name: Run tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
        ENGINE_MODE: mock
        ENGINE_MOCK_DELAY: "1"
      run: |
        set -o pipefail
        pytest tests/ --asyncio-mode=auto -v 2>&1 | tee pytest-output.txt
        status=${PIPESTATUS[0]}
        if [ "$status" -ne 0 ]; then
          pytest tests/ --asyncio-mode=auto -v 2>&1 | tee -a pytest-output.txt
          status=${PIPESTATUS[0]}
        fi
        exit "$status"

    - name: Summarize test failure
      if: failure()
      working-directory: backend
      run: |
        python - <<'PY'
        from pathlib import Path

        output_path = Path("pytest-output.txt")
        if not output_path.exists():
            print("::error title=pytest-failure::pytest-output.txt missing")
            raise SystemExit(0)

        text = output_path.read_text(encoding="utf-8", errors="replace")
        interesting = []
        for line in text.splitlines():
            line = line.strip()
            if not line:
                continue
            if " FAILED" in line or line.startswith("FAILED ") or line.startswith("ERROR "):
                interesting.append(line)
            elif line.startswith("E   "):
                interesting.append(line)

        message = " | ".join(interesting[:8])[:1500] if interesting else "Tests failed; inspect pytest-output.txt"
        print(f"::error title=pytest-failure::{message}")
        PY

